name: Bug Report
description: Report a problem with Handwriting Natively
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Project or app version, if known.
